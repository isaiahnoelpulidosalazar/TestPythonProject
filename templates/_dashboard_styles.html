  <style>
    .app-layout { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width); background: var(--navy-mid); border-right: 1px solid var(--navy-border);
      display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 12px; padding: 22px 20px 18px;
      border-bottom: 1px solid var(--navy-border);
    }
    .logo-icon {
      width: 40px; height: 40px; background: rgba(41,121,255,0.1); border: 1px solid var(--navy-border);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
    }
    .logo-title { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-primary); line-height: 1; }
    .logo-sub { font-size: 10px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-label { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; padding: 8px 8px 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: all 0.15s;
    }
    .nav-item:hover { background: var(--navy-light); color: var(--text-primary); }
    .nav-item.active { background: rgba(41,121,255,0.12); color: var(--accent-light); border: 1px solid rgba(41,121,255,0.2); }
    .nav-item.active svg { color: var(--accent); }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--navy-border); }
    .officer-card { display: flex; align-items: center; gap: 10px; }
    .officer-avatar {
      width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #1565c0);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .officer-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
    .officer-badge { font-size: 10px; color: var(--text-muted); }

    /* Main content */
    .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px; border-bottom: 1px solid var(--navy-border); background: var(--navy-mid);
      position: sticky; top: 0; z-index: 100; flex-shrink: 0;
    }
    .topbar-left { display: flex; flex-direction: column; }
    .topbar-greeting { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .topbar-date { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .dropdown-wrapper { position: relative; }
    .dropdown-btn {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px;
      background: var(--navy); border: 1px solid var(--navy-border); border-radius: 8px;
      color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .dropdown-btn:hover { background: var(--navy-light); color: var(--text-primary); }
    .dropdown-menu {
      position: absolute; right: 0; top: calc(100% + 8px); background: var(--navy-mid);
      border: 1px solid var(--navy-border); border-radius: 10px; min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); overflow: hidden; display: none; z-index: 200;
    }
    .dropdown-menu.open { display: block; }
    .dropdown-menu a, .dropdown-menu button {
      display: flex; align-items: center; gap: 10px; padding: 11px 16px;
      font-size: 13px; color: var(--text-secondary); border: none; background: none; width: 100%; text-align: left;
      transition: all 0.15s; cursor: pointer;
    }
    .dropdown-menu a:hover, .dropdown-menu button:hover { background: var(--navy-light); color: var(--text-primary); }
    .dropdown-menu .divider { height: 1px; background: var(--navy-border); margin: 4px 0; }
    .dropdown-menu .logout { color: var(--danger); }

    /* Page body */
    .page-body { padding: 28px; flex: 1; }

    /* Cards */
    .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card-bg); border: 1px solid var(--navy-border); border-radius: 14px;
      padding: 20px; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .stat-card.blue::before { background: linear-gradient(90deg, var(--accent), transparent); }
    .stat-card.green::before { background: linear-gradient(90deg, var(--success), transparent); }
    .stat-card.gold::before { background: linear-gradient(90deg, var(--gold), transparent); }
    .stat-card-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .stat-card-value { font-family: 'Rajdhani', sans-serif; font-size: 38px; font-weight: 700; color: var(--text-primary); line-height: 1; }
    .stat-card-diff { font-size: 12px; margin-top: 6px; }
    .diff-up { color: var(--danger); }
    .diff-down { color: var(--success); }
    .diff-zero { color: var(--text-muted); }

    /* Quick actions */
    .quick-actions { display: flex; gap: 12px; margin-bottom: 28px; }
    .quick-btn {
      display: flex; align-items: center; gap: 8px; padding: 12px 20px;
      background: var(--card-bg); border: 1px solid var(--navy-border); border-radius: 10px;
      font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
    }
    .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .quick-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .quick-btn.primary:hover { background: var(--accent-light); }

    /* Grid layout for home */
    .home-grid { display: grid; grid-template-columns: 1fr 360px; gap: 20px; }
    .card-box {
      background: var(--card-bg); border: 1px solid var(--navy-border); border-radius: 14px; overflow: hidden;
    }
    .card-box-header {
      padding: 16px 20px; border-bottom: 1px solid var(--navy-border); display: flex; align-items: center; justify-content: space-between;
    }
    .card-box-title { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .card-box-body { padding: 8px 0; }

    /* Report row */
    .report-row { display: flex; align-items: flex-start; gap: 12px; padding: 13px 20px; border-bottom: 1px solid rgba(30,58,95,0.4); }
    .report-row:last-child { border-bottom: none; }
    .report-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .report-info { flex: 1; }
    .report-type { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
    .report-meta { font-size: 11px; color: var(--text-muted); }
  </style>
