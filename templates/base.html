<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}AcciTrack{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://isaiahnoelpulidosalazar.github.io/js/ECStyleSheet.js"></script>
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --navy-light: #1a3460;
      --navy-border: #1e3a5f;
      --accent: #2979ff;
      --accent-light: #448aff;
      --accent-glow: rgba(41, 121, 255, 0.18);
      --gold: #ffc107;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --text-primary: #e8edf5;
      --text-secondary: #8ba3c7;
      --text-muted: #4d6a8f;
      --card-bg: #112240;
      --sidebar-width: 240px;
      --ec-bg: #112240;
      --ec-border: #1e3a5f;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--navy); color: var(--text-primary); }
    h1,h2,h3,h4,h5,h6 { font-family: 'Rajdhani', sans-serif; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: 'Inter', sans-serif; }
    input, select, textarea { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--navy); }
    ::-webkit-scrollbar-thumb { background: var(--navy-border); border-radius: 3px; }
    .badge-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .badge-pending { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .badge-approved { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
    .badge-declined { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
    .badge-closed { background: rgba(139,163,199,0.12); color: var(--text-secondary); border: 1px solid rgba(139,163,199,0.2); }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot-pending { background: var(--warning); }
    .dot-approved { background: var(--success); }
    .dot-declined { background: var(--danger); }
    .dot-closed { background: var(--text-secondary); }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      background: var(--navy-mid); border: 1px solid var(--navy-border); border-radius: 10px;
      padding: 14px 20px; font-size: 13px; min-width: 260px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideIn 0.3s ease;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0;
      pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--navy-mid); border: 1px solid var(--navy-border); border-radius: 16px;
      padding: 28px; width: 90%; max-width: 520px; max-height: 90vh; overflow-y: auto;
      transform: scale(0.95); transition: transform 0.2s;
    }
    .modal-overlay.open .modal-box { transform: scale(1); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
    .form-control {
      width: 100%; background: var(--navy); border: 1px solid var(--navy-border); border-radius: 8px;
      padding: 10px 14px; color: var(--text-primary); font-size: 14px; transition: border-color 0.2s;
    }
    .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .form-control::placeholder { color: var(--text-muted); }
    .btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 600; border: none; transition: all 0.2s; letter-spacing: 0.3px;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-light); box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-success { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
    .btn-success:hover { background: rgba(34,197,94,0.25); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--navy-border); }
    .btn-ghost:hover { background: var(--navy-light); color: var(--text-primary); }
    .section-title { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .section-title::before { content: ''; display: block; width: 3px; height: 20px; background: var(--accent); border-radius: 2px; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; padding: 12px 16px; border-bottom: 1px solid var(--navy-border); text-align: left; }
    tbody td { padding: 13px 16px; font-size: 13px; border-bottom: 1px solid rgba(30,58,95,0.4); vertical-align: middle; color: var(--text-primary); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(41,121,255,0.04); }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 14px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}

<div class="toast-container" id="toastContainer"></div>

<script>
function showToast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icon = type === 'success' ? '✓' : '✕';
  t.innerHTML = `<span style="font-size:16px;color:${type==='success'?'#22c55e':'#ef4444'}">${icon}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close modal on overlay click
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('open');
  }
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
