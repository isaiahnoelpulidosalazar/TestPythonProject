<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <polygon points="14,2 26,22 2,22" fill="none" stroke="#2979ff" stroke-width="2.5" stroke-linejoin="round"/>
        <line x1="14" y1="9" x2="14" y2="16" stroke="#2979ff" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="14" cy="19.5" r="1.5" fill="#2979ff"/>
      </svg>
    </div>
    <div>
      <div class="logo-title">AcciTrack</div>
      <div class="logo-sub">{{ 'Admin Panel' if user.role == 'admin' else 'Officer Portal' }}</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-label">Navigation</div>
    <a href="{{ url_for('admin_home' if user.role == 'admin' else 'officer_home') }}"
       class="nav-item {{ 'active' if active_page == 'home' }}">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/>
      </svg>
      Home
    </a>
    <a href="{{ url_for('admin_reports' if user.role == 'admin' else 'officer_reports') }}"
       class="nav-item {{ 'active' if active_page == 'reports' }}">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      Reports
    </a>
    <a href="{{ url_for('admin_notifications' if user.role == 'admin' else 'officer_notifications') }}"
       class="nav-item {{ 'active' if active_page == 'notifications' }}">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      Notifications
    </a>
    {% if user.role == 'admin' %}
    <a href="{{ url_for('admin_users') }}"
       class="nav-item {{ 'active' if active_page == 'users' }}">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      User Management
    </a>
    {% endif %}
  </nav>

  <div class="sidebar-footer">
    <div class="officer-card">
      <div class="officer-avatar">{{ user.first_name[0] }}{{ user.last_name[0] }}</div>
      <div class="officer-info">
        <div class="officer-name">{{ user.first_name }} {{ user.last_name }}</div>
        <div class="officer-badge">{{ user.badge_number }}</div>
      </div>
    </div>
  </div>
</aside>
